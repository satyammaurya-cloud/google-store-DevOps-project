apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:e1e01499d9f79652a038c27c7f54674697b56d99
          ports:
            - containerPort: 5000
