apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:bb1172a9db2c80bb1d02e811e23888bb5c789538
          ports:
            - containerPort: 5000
