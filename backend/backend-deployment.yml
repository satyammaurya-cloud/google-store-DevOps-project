apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:7b488b09928436513612dd93ad91224287ddf24f
          ports:
            - containerPort: 5000
