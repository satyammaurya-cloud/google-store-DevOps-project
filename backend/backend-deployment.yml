apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:a4f0669187251e9a88ccff65aecc23ba87cb3665
          ports:
            - containerPort: 5000
