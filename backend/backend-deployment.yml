apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:54860de2b4248c2469c3e4141c1789cc5ba0b959
          ports:
            - containerPort: 5000
