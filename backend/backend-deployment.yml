apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:c8e7a7295b956615cfa2ca7a6d0642997e02a223
          ports:
            - containerPort: 5000
