apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:51da088f3d7559ffaac4d74b593bf547442a10a1
          ports:
            - containerPort: 5000
