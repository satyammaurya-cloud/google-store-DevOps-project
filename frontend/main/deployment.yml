apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:54860de2b4248c2469c3e4141c1789cc5ba0b959
        ports:
        - containerPort: 80

