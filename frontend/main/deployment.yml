apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:ac37d3f703262c6f5afc4f2734baba5dcde7c921
        ports:
        - containerPort: 80

