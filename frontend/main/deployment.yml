apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:c8e7a7295b956615cfa2ca7a6d0642997e02a223
        ports:
        - containerPort: 80

