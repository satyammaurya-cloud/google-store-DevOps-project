apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:e1e01499d9f79652a038c27c7f54674697b56d99
        ports:
        - containerPort: 80

