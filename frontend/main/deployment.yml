apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:bb1172a9db2c80bb1d02e811e23888bb5c789538
        ports:
        - containerPort: 80

