apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:c8e7a7295b956615cfa2ca7a6d0642997e02a223
        ports:
        - containerPort: 80
