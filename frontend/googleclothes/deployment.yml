apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:ac37d3f703262c6f5afc4f2734baba5dcde7c921
        ports:
        - containerPort: 80
