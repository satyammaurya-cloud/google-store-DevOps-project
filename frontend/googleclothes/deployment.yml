apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:3ac90f8d6ff9fcf4c559584fe5bd98b24a77e922
        ports:
        - containerPort: 80
