apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:bb1172a9db2c80bb1d02e811e23888bb5c789538
        ports:
        - containerPort: 80
