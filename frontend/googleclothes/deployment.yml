apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:51da088f3d7559ffaac4d74b593bf547442a10a1
        ports:
        - containerPort: 80
