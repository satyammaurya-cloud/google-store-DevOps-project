apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:7b488b09928436513612dd93ad91224287ddf24f
        ports:
        - containerPort: 80
