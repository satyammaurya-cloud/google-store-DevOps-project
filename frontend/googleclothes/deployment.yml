apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:54860de2b4248c2469c3e4141c1789cc5ba0b959
        ports:
        - containerPort: 80
