apiVersion: apps/v1
kind: Deployment
metadata:
  name: computers-deployment
  labels:
    app: computers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: computers
  template:
    metadata:
      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-computers:bb1172a9db2c80bb1d02e811e23888bb5c789538
        ports:
        - containerPort: 80
