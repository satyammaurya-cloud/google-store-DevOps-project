apiVersion: apps/v1
kind: Deployment
metadata:
  name: computers-deployment
  labels:
    app: computers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: computers
  template:
    metadata:
      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-computers:33547a9cecdec5e50e5cf54dd8a4abc12a3ca907
        ports:
        - containerPort: 80
