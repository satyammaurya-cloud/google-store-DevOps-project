apiVersion: apps/v1
kind: Deployment
metadata:
  name: computers-deployment
  labels:
    app: computers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: computers
  template:
    metadata:
      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-computers:51da088f3d7559ffaac4d74b593bf547442a10a1
        ports:
        - containerPort: 80
