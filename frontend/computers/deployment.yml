apiVersion: apps/v1
kind: Deployment
metadata:
  name: computers-deployment
  labels:
    app: computers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: computers
  template:
    metadata:
      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-computers:e1e01499d9f79652a038c27c7f54674697b56d99
        ports:
        - containerPort: 80
