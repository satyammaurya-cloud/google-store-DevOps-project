apiVersion: apps/v1
kind: Deployment
metadata:
  name: computers-deployment
  labels:
    app: computers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: computers
  template:
    metadata:
      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-computers:7b488b09928436513612dd93ad91224287ddf24f
        ports:
        - containerPort: 80
