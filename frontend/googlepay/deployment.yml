apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:4df4bae158384863ab7ff6e2b57b5d270fded804
        ports:
        - containerPort: 80
