apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:c8e7a7295b956615cfa2ca7a6d0642997e02a223
        ports:
        - containerPort: 80
