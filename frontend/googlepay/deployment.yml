apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:54860de2b4248c2469c3e4141c1789cc5ba0b959
        ports:
        - containerPort: 80
