apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:d48c56732354e6c7a6a438bb0553e1865f1b7022
        ports:
        - containerPort: 80
