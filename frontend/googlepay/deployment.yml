apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:3ac90f8d6ff9fcf4c559584fe5bd98b24a77e922
        ports:
        - containerPort: 80
