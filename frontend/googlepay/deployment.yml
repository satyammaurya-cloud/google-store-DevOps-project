apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:ac37d3f703262c6f5afc4f2734baba5dcde7c921
        ports:
        - containerPort: 80
