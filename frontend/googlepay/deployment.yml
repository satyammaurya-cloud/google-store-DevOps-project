apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:7b488b09928436513612dd93ad91224287ddf24f
        ports:
        - containerPort: 80
