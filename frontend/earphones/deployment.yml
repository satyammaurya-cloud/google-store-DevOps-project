      labels:
        app: earphones
    spec:
      containers:
      - name: earphones
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-earphones:a4f0669187251e9a88ccff65aecc23ba87cb3665
        ports:
        - containerPort: 80
