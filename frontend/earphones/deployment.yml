apiVersion: apps/v1
kind: Deployment
metadata:
  name: earphones-deployment
  labels:
    app: earphones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: earphones
  template:
    metadata:
      labels:
        app: earphones
    spec:
      containers:
      - name: earphones
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-earphones:33547a9cecdec5e50e5cf54dd8a4abc12a3ca907
        ports:
        - containerPort: 80
