        app: earphones
    spec:
      containers:
      - name: earphones
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-earphones:7b488b09928436513612dd93ad91224287ddf24f
        ports:
        - containerPort: 80
