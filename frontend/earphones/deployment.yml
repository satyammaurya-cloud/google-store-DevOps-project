apiVersion: apps/v1
kind: Deployment
metadata:
  name: earphones-deployment
  labels:
    app: earphones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: earphones
  template:
    metadata:
      labels:
        app: earphones
    spec:
      containers:
      - name: earphones
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-earphones:6a940b2e92995a03a283d01be248cda9708f1203
        ports:
        - containerPort: 80
