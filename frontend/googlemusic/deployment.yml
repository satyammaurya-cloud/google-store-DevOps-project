apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:bb1172a9db2c80bb1d02e811e23888bb5c789538
        ports:
        - containerPort: 80
