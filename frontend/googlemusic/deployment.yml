apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:ac37d3f703262c6f5afc4f2734baba5dcde7c921
        ports:
        - containerPort: 80
