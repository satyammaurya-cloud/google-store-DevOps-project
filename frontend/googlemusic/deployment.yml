apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:4df4bae158384863ab7ff6e2b57b5d270fded804
        ports:
        - containerPort: 80
