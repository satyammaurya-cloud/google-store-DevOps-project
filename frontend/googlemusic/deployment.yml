apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:c8e7a7295b956615cfa2ca7a6d0642997e02a223
        ports:
        - containerPort: 80
