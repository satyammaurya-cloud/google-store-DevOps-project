apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:7b488b09928436513612dd93ad91224287ddf24f
        ports:
        - containerPort: 80
