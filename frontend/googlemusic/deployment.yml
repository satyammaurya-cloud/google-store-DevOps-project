apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:54860de2b4248c2469c3e4141c1789cc5ba0b959
        ports:
        - containerPort: 80
