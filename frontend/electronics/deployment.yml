apiVersion: apps/v1
kind: Deployment
metadata:
  name: electronics-deployment
  labels:
    app: electronics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: electronics
  template:
    metadata:
      labels:
        app: electronics
    spec:
      containers:
      - name: electronics
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-electronics:d48c56732354e6c7a6a438bb0553e1865f1b7022
        ports:
        - containerPort: 80
