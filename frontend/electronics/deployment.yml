apiVersion: apps/v1
kind: Deployment
metadata:
  name: electronics-deployment
  labels:
    app: electronics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: electronics
  template:
    metadata:
      labels:
        app: electronics
    spec:
      containers:
      - name: electronics
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-electronics:51da088f3d7559ffaac4d74b593bf547442a10a1
        ports:
        - containerPort: 80
