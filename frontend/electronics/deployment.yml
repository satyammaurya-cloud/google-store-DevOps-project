apiVersion: apps/v1
kind: Deployment
metadata:
  name: electronics-deployment
  labels:
    app: electronics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: electronics
  template:
    metadata:
      labels:
        app: electronics
    spec:
      containers:
      - name: electronics
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-electronics:bb1172a9db2c80bb1d02e811e23888bb5c789538
        ports:
        - containerPort: 80
