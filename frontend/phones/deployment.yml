apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:3ac90f8d6ff9fcf4c559584fe5bd98b24a77e922
        ports:
        - containerPort: 80
