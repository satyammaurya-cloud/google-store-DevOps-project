apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:7b488b09928436513612dd93ad91224287ddf24f
        ports:
        - containerPort: 80
