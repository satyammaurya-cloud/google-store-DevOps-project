apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:6a940b2e92995a03a283d01be248cda9708f1203
        ports:
        - containerPort: 80
