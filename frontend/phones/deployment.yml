apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:bb1172a9db2c80bb1d02e811e23888bb5c789538
        ports:
        - containerPort: 80
