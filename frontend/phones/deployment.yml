apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:4c139d595ee028be721be4c50d454c01baab114b
        ports:
        - containerPort: 80
