apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:d48c56732354e6c7a6a438bb0553e1865f1b7022
        ports:
        - containerPort: 80
