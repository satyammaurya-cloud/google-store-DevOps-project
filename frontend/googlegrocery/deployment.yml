apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:33547a9cecdec5e50e5cf54dd8a4abc12a3ca907
        ports:
        - containerPort: 80
