apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:6a940b2e92995a03a283d01be248cda9708f1203
        ports:
        - containerPort: 80
