apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 982630149008.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:d48c56732354e6c7a6a438bb0553e1865f1b7022
        ports:
        - containerPort: 80
