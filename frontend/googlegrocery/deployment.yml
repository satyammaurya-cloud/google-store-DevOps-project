apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:ac37d3f703262c6f5afc4f2734baba5dcde7c921
        ports:
        - containerPort: 80
