apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:c8e7a7295b956615cfa2ca7a6d0642997e02a223
        ports:
        - containerPort: 80
