apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 683707058733.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:7b488b09928436513612dd93ad91224287ddf24f
        ports:
        - containerPort: 80
